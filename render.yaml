# Nexcierge Frontend — Render Blueprint
# Docs: https://render.com/docs/blueprint-spec
#
# Cross-blueprint env wiring isn't supported, so NEXT_PUBLIC_BACKEND_URL must
# be set manually in the Render dashboard. Paste the public URL of the
# `nexcierge-backend` service from the backend blueprint.

services:
  - type: web
    name: nexcierge-frontend
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_BACKEND_URL
        sync: false       # e.g. https://nexcierge-backend.onrender.com
      # Same value as nexcierge-backend's BACKEND_SHARED_SECRET. Sent as the
      # x-internal-token header on every server-side call to the backend so
      # the backend can reject direct/unauthenticated callers. (Frontend
      # deploys on Vercel — set this there too, not just here.)
      - key: BACKEND_SHARED_SECRET
        sync: false
